name: CI

on:
  push:
    branches: [ "main", "work" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Run Unit Tests (plugin-runtime)
      run: ./gradlew :plugin-runtime:test --no-daemon

    - name: Run Unit Tests (player-abstraction)
      run: ./gradlew :player-abstraction:test --no-daemon

    - name: Run Unit Tests (desktop-app)
      run: ./gradlew :desktop-app:test --no-daemon

    - name: Build Desktop App
      run: ./gradlew :desktop-app:assemble --no-daemon

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          desktop-app/build/reports/tests/
          plugin-runtime/build/reports/tests/
          player-abstraction/build/reports/tests/
